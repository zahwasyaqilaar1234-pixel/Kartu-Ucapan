<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>Surprise!!</title>
  <style>
    body {
      background: #2c3e50;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Press Start 2P', 'Courier New', Monospace;
      font-size: 8px;
      line-height: 1.6;
    }
    
    .gameboy {
      background: #c3c3c3;
      border-radius: 10px 10px 50px 10px;
      padding: 30px 20px 40px 20px;
      box-shadow: 0 10px 20px black;
      width: 320px;
    }
    
    .screen {
      background: #9bbc0f;
      border: 8px solid #2c3e50;
      position: relative;
      padding: 20px;
      text-align: center;
      min-height: 200px;
      margin-bottom: 30px;
      transition: 0.3s;
    }
    
    h1 {
      color: #2c0b3d;
      font-size: 16px;
      margin: 0;
    }
    
    p {
      color: #2c0b3d;
      font-size: 14px;
    }
    
    .hidden {
      display: none;
    }
    
    .buttons {
      display: flex;
      justify-content: center;
      gap: 40px;
    }
    
    .btn {
      width: 50px;
      height: 50px;
      background: #8bac0f;
      border-radius: 50%;
      border: 4px solid #0f380f;
      color: white;
      font-weight: bold;
      font-size: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 -5px 0 #0f380f;
      cursor: pointer;
    }
    
    .btn:active {
      box-shadow: inset 0 2px 0 #0f380f;
      transform: translateY(3px);
    }
    
    .bola {
      position: absolute;
      bottom: -25px;
      left: -15px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      animation: mantul 1.5s infinite ease-in-out;
    }
    
    .bola2 {
      position: absolute;
      bottom: -25px;
      right: -15px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      animation: mantul 1.5s infinite ease-in-out;
    }
    
    @keyframes mantul {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-70px) rotate(360deg); }
    }
    
    #resetBtn {
      background: #e74c3c;
      border: 3px solid #c0392b;
      color: white;
      font-family: 'Press Start 2P', 'Courier New', Monospace;
      font-size: 8px;
      padding: 10px;
      margin-top: 15px;
      cursor: pointer;
      border-radius: 5px;
    }
    
    #resetBtn:active {
      transform: translateY(3px);
    }
    
    .kedip {
      animation: blink 1s step-start infinite;
    }
    
    @keyframes blink {
      50% { opacity: 0;}
    }
    
    .lampu {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 15px;
    }
    
    .led {
      width: 12px;
      height: 12px;
      background: #e74c3c;
      box-shadow: 0 0 8px #e74c3c;
      animation: ledKedip 1s steps(2, end) infinite;
    }
    
    .led:nth-child(1), .led:nth-child(3) {
      border-radius: 2px 0 2px 0;
    }
    
    .led:nth-child(2), .led:nth-child(4) {
      background: #f1c40f;
      box-shadow: 0 0 8px #f1c40f;
      animation-delay: 0.5s;
      border-radius: 0 2px 0 2px;
    }
    
    @keyframes ledKedip {
      50% { 
        opacity: 0.3;
        box-shadow: none;
      }
    }
    
    .kotak-pesan {
      background: #a8c090;
      border: 4px solid #7a9a65;
      padding: 12px;
      margin-top: 10px;
      border-radius: 4px;
      box-shadow: inset 0 0 0 2px #2c3e50;
    }
    
    .screen2 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    
    .hidden { display: none !important; }
    
    .piring {
      width: 180px;
      height: 180px;
      animation: muter 3s linear infinite;
    }
    
    @keyframes muter {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .judul-lagu {
      color: #5a6e47;
      font-size: 18px;
    }
    
    .btn-next, .btn-back {
      background: #7a9a65;
      border: 3px solid #5a6e47;
      color: #0f380f;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    .btn-next:active, .btn-back:active {
      transform: scale(0.95);
    }
    
    .screen2, .screen2 {
      min-height: 250px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="gameboy">
    <div class="lampu">
      <div class="led"></div>
      <div class="led"></div>
      <div class="led"></div>
      <div class="led"></div>
    </div>
    <div class="screen" id="layar">
      <h1 class="kedip">HAPPY BIRTHDAY!!</h1>
    <div class="kotak-pesan">
      <p>Hai Uta</p>
      <p id="pesan">Tekan tombol A atau B jangan tekan tombol stalking mantan HAHA</p>
      <p class="hidden" id="boom">HAPPY LEVEL UP! YAWW!<br>Sehat selalu ya!<br>Semoga impian kamu di umur sekarang tercapai dan semoga bahagia selalu, Aamiin<br>Sekali lagi selamat 17!</p>
      <img class="bola" src="bola.png" alt="bola">
      <img class="bola2" src="bola.png" alt="bola2">
      <button class="btn-next" onclick="gantiLayar()">Next!</button>
    </div>
   </div>
      <div class="screen screen2 hidden" id="layar2">
        <img class="piring" src="piring-musik.png" alt="piring">
        <h2 class="judul-lagu">Di Ujung Jalan</h2>
        <button class="btn-play" onclick="playPause()">Play!</button>
        <button class="btn-back" onclick="kembali()">Back!</button>
        <audio id="lagu" src="lagu.mp3" alt="lagu"></audio>
      </div>
      <button class="hidden" id="resetBtn" onclick="resetGame()">RESET</button>
  
  <div class="buttons">
    <div class="btn" onclick="boom()">A</div>
    <div class="btn" onclick="gantiWarna()">B</div>
  </div>
</div>

 <script>
  let warna = ['#9b59b6', '#e74c3c', '#3498db', '#2ecc71']
  let index = 0;
  
  function boom() {
    document.getElementById('pesan').classList.add('hidden');
    document.getElementById('boom').classList.remove('hidden');
    document.getElementById('resetBtn').classList.remove('hidden');
  }
  
  function gantiWarna() {
    index = index + 1;
    if(index >= warna.length) index = 0;
    document.getElementById('layar').style.background = warna[index];
  }
  
  function resetGame() {
    document.getElementById('boom').classList.add('hidden');
    document.getElementById('resetBtn').classList.add('hidden');
    document.getElementById('pesan').classList.remove('hidden');
    document.getElementById('layar').style.background = warna[0];
  }
  
  function gantiLayar() {
    document.getElementById('layar').classList.add('hidden');
    document.getElementById('layar2').classList.remove('hidden');
  }
  
  function playPause() {
    let lagu = document.getElementById('lagu');
    let btn = document.querySelector('.btn-play');
    
    if(lagu.paused) {
      lagu.play();
      btn.textContent = 'Pause';
    } else {
      lagu.pause();
      btn.textContent = 'Play';
    }
  }
  
  function kembali() {
    document.getElementById('lagu').pause();
    document.getElementById('lagu').currentTime = 0;
    document.querySelector('.btn-play').textContent = 'Play';
    document.getElementById('layar2').classList.add('hidden');
    document.getElementById('layar').classList.remove('hidden');
  }
 </script>
</body>
</html>
